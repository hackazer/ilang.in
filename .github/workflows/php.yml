name: PHP quality

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up locked Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked browser dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Audit browser dependencies
        run: npm audit --audit-level=high

      - name: Run browser compatibility tests
        run: npm test

      - name: Verify browser asset reproducibility
        run: npm run check:browser

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.5']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, fileinfo, gd, intl, mbstring, mysqli, pdo_mysql
          coverage: none
          tools: composer:2.10.2

      - name: Validate Composer metadata
        run: composer validate --strict --no-interaction

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Audit dependencies
        run: composer audit --abandoned=fail --no-interaction

      - name: Run tests
        run: composer test

      - name: Lint first-party PHP
        run: composer lint
