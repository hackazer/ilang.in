name: PHP quality

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up locked Node.js LTS
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24.18.0'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install locked browser dependencies
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Audit browser dependencies
        run: npm audit --audit-level=high

      - name: Run browser compatibility tests
        run: npm test

      - name: Verify browser asset reproducibility
        run: npm run check:browser

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            phpunit: '12.5.31'
          - php: '8.5'
            phpunit: '13.2.4'

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, fileinfo, gd, intl, mbstring, mysqli, pdo_mysql
          coverage: none
          tools: composer:2.10.2, phpunit:${{ matrix.phpunit }}

      - name: Validate Composer metadata
        run: composer validate --strict --no-interaction

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Audit dependencies
        run: composer audit --abandoned=fail --no-interaction

      - name: Run tests with the latest runner supported by this PHP runtime
        run: phpunit --configuration phpunit.xml

      - name: Lint first-party PHP
        run: composer lint
